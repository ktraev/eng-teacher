<!DOCTYPE html>
<html lang="bg">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
<title>English Teacher</title>
<style>
  :root { --bg:#0f172a; --card:#1e293b; --accent:#6366f1; --accent2:#22c55e;
          --warn:#f59e0b; --err:#ef4444; --text:#f1f5f9; --muted:#94a3b8; }
  * { box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  body { margin:0; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
         background:var(--bg); color:var(--text); min-height:100vh; }
  .wrap { max-width:560px; margin:0 auto; padding:18px 16px 60px; }
  h1 { font-size:22px; text-align:center; margin:6px 0 16px; }
  h2 { font-size:18px; margin:0 0 10px; }
  .card { background:var(--card); border-radius:18px; padding:18px; margin-bottom:14px;
          box-shadow:0 6px 20px rgba(0,0,0,.25); }
  .hidden { display:none !important; }
  button { font-size:17px; font-weight:600; border:none; border-radius:13px; padding:15px 18px;
           width:100%; color:#fff; background:var(--accent); cursor:pointer; margin-top:10px; transition:.12s; }
  button:active { transform:scale(.98); }
  button.green { background:var(--accent2); }
  button.ghost { background:transparent; border:2px solid var(--accent); color:var(--text); }
  button.small { width:auto; padding:9px 12px; font-size:14px; margin:0; }
  button.danger { background:var(--err); }
  button:disabled { opacity:.5; }
  .row-btns { display:flex; gap:8px; }
  .file-btn { display:block; text-align:center; border:2px dashed var(--accent); border-radius:13px;
              padding:22px 12px; color:var(--muted); font-size:15px; cursor:pointer; }
  input[type=file] { display:none; }
  .thumbs { display:flex; flex-wrap:wrap; gap:6px; margin-top:10px; }
  .thumbs img { width:52px; height:52px; object-fit:cover; border-radius:8px; }
  .txt { width:100%; font-size:16px; padding:11px 12px; border-radius:10px; border:1px solid #334155;
         background:#0f172a; color:var(--text); }
  .status { text-align:center; color:var(--muted); min-height:20px; margin:8px 0; }

  /* folder list */
  .folder { display:flex; align-items:center; gap:10px; padding:14px; border-radius:13px;
            background:#0f172a; margin-bottom:10px; }
  .folder .main { flex:1; cursor:pointer; }
  .folder .fname { font-size:17px; font-weight:700; }
  .folder .fmeta { font-size:13px; color:var(--muted); margin-top:3px; }
  .badge { font-size:13px; font-weight:700; border-radius:9px; padding:4px 9px; white-space:nowrap; }
  .badge.new { background:#334155; color:var(--muted); }
  .badge.good { background:var(--accent2); color:#04250f; }
  .badge.mid { background:var(--warn); color:#3d2900; }
  .badge.bad { background:var(--err); color:#fff; }
  .icon-btn { background:transparent; width:auto; margin:0; padding:6px 8px; font-size:18px; border:none; }

  /* editable table */
  .erow { display:flex; gap:6px; align-items:flex-start; margin-bottom:8px; }
  .erow .en-in { flex:0 0 32%; }
  .erow .mean-in { flex:1; }
  .erow .del { background:transparent; color:var(--err); width:auto; margin:0; padding:8px 6px; font-size:18px; }
  .rowwarn { color:var(--warn); font-size:12px; margin:-4px 0 8px 2px; }

  /* quiz */
  .bigword { text-align:center; font-size:40px; font-weight:800; margin:14px 0; letter-spacing:1px; }
  .progress { text-align:center; color:var(--muted); font-size:14px; margin-bottom:4px; }
  .mic { width:92px; height:92px; border-radius:50%; margin:14px auto; display:flex;
         align-items:center; justify-content:center; font-size:38px; background:var(--accent); }
  .mic.rec { background:var(--err); animation:pulse 1s infinite; }
  @keyframes pulse { 0%{box-shadow:0 0 0 0 rgba(239,68,68,.6)} 100%{box-shadow:0 0 0 22px rgba(239,68,68,0)} }
  .feedback { text-align:center; font-size:16px; margin:10px 0; line-height:1.45; }
  .ok { color:var(--accent2); } .bad { color:var(--err); }
  .heard { text-align:center; color:var(--muted); font-size:14px; font-style:italic; }
  .sent { font-size:20px; text-align:center; margin:14px 0; line-height:1.4; }
  .spinner { width:32px;height:32px;border:4px solid #334155;border-top-color:var(--accent);
             border-radius:50%;animation:spin 1s linear infinite;margin:18px auto; }
  @keyframes spin { to { transform:rotate(360deg); } }
  .backlink { color:var(--muted); font-size:14px; cursor:pointer; display:inline-block; margin-bottom:6px; }
</style>
</head>
<body>
<div class="wrap">
  <h1>📚 English Teacher</h1>

  <!-- ============ SCREEN 1a: FOLDERS ============ -->
  <div id="foldersScreen" class="card">
    <h2>Папки с думи</h2>
    <div id="folderList"></div>
    <div id="emptyFolders" class="status hidden">Още няма папки. Създай първата!</div>
    <button id="newFolderBtn" class="green">＋ Нова папка</button>
  </div>

  <!-- ============ SCREEN 1b: EDITOR (upload + edit + save) ============ -->
  <div id="editorScreen" class="card hidden">
    <span class="backlink" onclick="goHome()">← Назад към папките</span>
    <h2 id="editorTitle">Нова папка</h2>

    <label class="file-btn" for="fileInput">📷 Качи много снимки на страниците</label>
    <input id="fileInput" type="file" accept="image/*" multiple />
    <div id="thumbs" class="thumbs"></div>
    <button id="ocrBtn" class="ghost" disabled>Прочети думите от снимките</button>
    <div id="ocrStatus" class="status"></div>

    <h2 style="margin-top:16px">Думи (може да редактираш)</h2>
    <div id="rows"></div>
    <button id="addRowBtn" class="ghost small" style="width:100%">＋ Добави ред</button>

    <div style="margin-top:16px">
      <input id="folderName" class="txt" placeholder="Име на папката (напр. Урок 5)" />
    </div>
    <button id="saveFolderBtn" class="green">💾 Запази папката</button>
    <div id="saveStatus" class="status"></div>
  </div>

  <!-- ============ SCREEN 2: QUIZ ============ -->
  <div id="quizScreen" class="card hidden">
    <span class="backlink" onclick="quitToHome()">← Изход към папките</span>
    <div id="progress" class="progress"></div>
    <div id="bigword" class="bigword">…</div>
    <div id="mic" class="mic">🎤</div>
    <div id="quizStatus" class="status">Натисни микрофона и кажи значенията</div>
    <div id="heard" class="heard"></div>
    <div id="quizFeedback" class="feedback"></div>
    <button id="recBtn">🎤 Кажи отговора</button>
    <button id="repeatBtn" class="ghost">🔁 Повтори думата</button>
    <button id="nextBtn" class="green hidden">Напред ▶</button>
  </div>

  <!-- ============ TRANSLATION ============ -->
  <div id="translateScreen" class="card hidden">
    <h2>Преведи изречението на английски 🌍</h2>
    <div id="tProgress" class="progress"></div>
    <div id="sentence" class="sent">…</div>
    <div id="tMic" class="mic">🎤</div>
    <div id="tStatus" class="status">Натисни микрофона и кажи превода</div>
    <div id="tHeard" class="heard"></div>
    <div id="tFeedback" class="feedback"></div>
    <button id="tRecBtn">🎤 Кажи превода</button>
    <button id="tRepeatBtn" class="ghost">🔁 Повтори изречението</button>
  </div>

  <!-- ============ DONE ============ -->
  <div id="doneScreen" class="card hidden" style="text-align:center">
    <div style="font-size:52px">🎉</div>
    <h2>Браво! Готова си!</h2>
    <div id="doneScore" class="status"></div>
    <button id="doneHomeBtn" class="green">Обратно към папките</button>
  </div>
</div>

<script>
const $ = (id) => document.getElementById(id);
const STORAGE_KEY = 'et_folders_v1';

// ---------------- storage ----------------
let folders = [];
function loadFolders() {
  try { folders = JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; }
  catch { folders = []; }
}
function saveFolders() { localStorage.setItem(STORAGE_KEY, JSON.stringify(folders)); }
function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2, 7); }
function escapeHtml(s){return String(s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}

// ---------------- screen switching ----------------
const SCREENS = ['foldersScreen','editorScreen','quizScreen','translateScreen','doneScreen'];
function showScreen(id){ SCREENS.forEach(s => $(s).classList.toggle('hidden', s !== id)); window.scrollTo(0,0); }
function goHome(){ renderFolders(); showScreen('foldersScreen'); }

// ================= SCREEN 1a: FOLDERS =================
function scoreBadge(f){
  if (!f.lastScore) return '<span class="badge new">нова</span>';
  const p = f.lastScore.pct;
  const cls = p === 0 ? 'good' : p <= 30 ? 'mid' : 'bad';
  const label = p === 0 ? '0% грешки ✓' : p + '% грешки';
  return '<span class="badge ' + cls + '">' + label + '</span>';
}
function renderFolders(){
  const list = $('folderList');
  $('emptyFolders').classList.toggle('hidden', folders.length > 0);
  list.innerHTML = folders.map(f => `
    <div class="folder">
      <div class="main" onclick="startExercise('${f.id}')">
        <div class="fname">${escapeHtml(f.name)}</div>
        <div class="fmeta">${f.words.length} думи${f.lastScore ? ' · последно: ' + f.lastScore.errors + '/' + f.lastScore.total + ' грешки' : ''}</div>
      </div>
      ${scoreBadge(f)}
      <button class="icon-btn" onclick="editFolder('${f.id}')" title="Редактирай">✏️</button>
      <button class="icon-btn" onclick="deleteFolder('${f.id}')" title="Изтрий">🗑️</button>
    </div>`).join('');
}
$('newFolderBtn').addEventListener('click', () => openEditor(null));
$('doneHomeBtn').addEventListener('click', goHome);

function deleteFolder(id){
  const f = folders.find(x => x.id === id);
  if (!f) return;
  if (!confirm('Да изтрия папка „' + f.name + '“?')) return;
  folders = folders.filter(x => x.id !== id);
  saveFolders(); renderFolders();
}
function editFolder(id){ const f = folders.find(x => x.id === id); if (f) openEditor(f); }

// ================= SCREEN 1b: EDITOR =================
let editRows = [];      // [{english, meanings:[], warnings:[]}]
let editingId = null;   // folder id if editing, else null
let editFiles = [];

function openEditor(folder){
  editingId = folder ? folder.id : null;
  editRows = folder ? folder.words.map(w => ({ english:w.english, meanings:[...w.meanings], warnings:[] }))
                    : [];
  editFiles = [];
  $('editorTitle').textContent = folder ? 'Редакция: ' + folder.name : 'Нова папка';
  $('folderName').value = folder ? folder.name : '';
  $('thumbs').innerHTML = '';
  $('ocrStatus').textContent = '';
  $('saveStatus').textContent = '';
  $('fileInput').value = '';
  $('ocrBtn').disabled = true;
  if (!editRows.length) editRows.push({ english:'', meanings:[], warnings:[] });
  renderRows();
  showScreen('editorScreen');
}

$('fileInput').addEventListener('change', (e) => {
  editFiles = Array.from(e.target.files);
  $('thumbs').innerHTML = '';
  editFiles.forEach(f => { const i = document.createElement('img'); i.src = URL.createObjectURL(f); $('thumbs').appendChild(i); });
  $('ocrBtn').disabled = editFiles.length === 0;
});

$('ocrBtn').addEventListener('click', async () => {
  if (!editFiles.length) return;
  $('ocrBtn').disabled = true;
  $('ocrStatus').innerHTML = '<div class="spinner"></div>Чета ' + editFiles.length + ' снимки…';
  try {
    const fd = new FormData();
    editFiles.forEach(f => fd.append('photos', f));
    const r = await fetch('/api/ocr', { method:'POST', body: fd });
    const j = await r.json();
    if (j.error) throw new Error(j.error);
    syncFromDom();
    // drop the blank starter row if it's still empty
    editRows = editRows.filter(row => row.english.trim() || row.meanings.length);
    (j.words || []).forEach(w => editRows.push({ english:w.english, meanings:w.meanings, warnings:w.warnings || [] }));
    if (!editRows.length) editRows.push({ english:'', meanings:[], warnings:[] });
    renderRows();
    const warned = (j.words || []).filter(w => w.warnings && w.warnings.length).length;
    $('ocrStatus').textContent = 'Добавих ' + (j.words||[]).length + ' думи' + (warned ? ' (⚠️ ' + warned + ' с възможни грешки)' : '') + '. Провери и редактирай.';
  } catch (err) {
    $('ocrStatus').textContent = 'Грешка: ' + err.message;
  }
  $('ocrBtn').disabled = false;
});

function syncFromDom(){
  document.querySelectorAll('#rows .erow').forEach((el, i) => {
    if (!editRows[i]) editRows[i] = { english:'', meanings:[], warnings:[] };
    editRows[i].english = el.querySelector('.en-in').value.trim();
    editRows[i].meanings = el.querySelector('.mean-in').value.split(/[,;/]/).map(x=>x.trim()).filter(Boolean);
  });
}
function renderRows(){
  $('rows').innerHTML = editRows.map((row, i) => `
    <div class="erow" data-index="${i}">
      <input class="txt en-in" placeholder="дума" value="${escapeHtml(row.english)}" />
      <input class="txt mean-in" placeholder="значения (разделени със запетая)" value="${escapeHtml(row.meanings.join(', '))}" />
      <button class="del" onclick="removeRow(${i})">✕</button>
    </div>
    ${row.warnings && row.warnings.length ? '<div class="rowwarn">⚠️ ' + row.warnings.map(escapeHtml).join(' ') + '</div>' : ''}
  `).join('');
}
function addRow(){ syncFromDom(); editRows.push({ english:'', meanings:[], warnings:[] }); renderRows(); }
function removeRow(i){ syncFromDom(); editRows.splice(i,1); if(!editRows.length) editRows.push({english:'',meanings:[],warnings:[]}); renderRows(); }
$('addRowBtn').addEventListener('click', addRow);

$('saveFolderBtn').addEventListener('click', () => {
  syncFromDom();
  const name = $('folderName').value.trim();
  const words = editRows
    .filter(r => r.english.trim() && r.meanings.length)
    .map(r => ({ english:r.english.trim(), meanings:r.meanings }));
  if (!name) { $('saveStatus').textContent = 'Дай име на папката.'; return; }
  if (!words.length) { $('saveStatus').textContent = 'Добави поне една дума с превод.'; return; }
  if (editingId) {
    const f = folders.find(x => x.id === editingId);
    f.name = name; f.words = words;   // keep previous lastScore
  } else {
    folders.unshift({ id: uid(), name, words, lastScore: null, createdAt: Date.now() });
  }
  saveFolders();
  goHome();
});

// ================= AUDIO HELPERS (Safari/iOS safe) =================
let player = null;
function getPlayer(){ if(!player){ player = new Audio(); player.setAttribute('playsinline',''); } return player; }
function silentWavUrl(ms=120){
  const sr=8000, n=(sr*ms/1000)|0, buf=new ArrayBuffer(44+n*2), v=new DataView(buf);
  const w=(o,s)=>{for(let i=0;i<s.length;i++)v.setUint8(o+i,s.charCodeAt(i));};
  w(0,'RIFF');v.setUint32(4,36+n*2,true);w(8,'WAVE');w(12,'fmt ');
  v.setUint32(16,16,true);v.setUint16(20,1,true);v.setUint16(22,1,true);
  v.setUint32(24,sr,true);v.setUint32(28,sr*2,true);v.setUint16(32,2,true);
  v.setUint16(34,16,true);w(36,'data');v.setUint32(40,n*2,true);
  return URL.createObjectURL(new Blob([buf],{type:'audio/wav'}));
}
function unlockAudio(){ const p=getPlayer(); try{ p.src=silentWavUrl(); const pr=p.play(); if(pr&&pr.catch)pr.catch(()=>{}); }catch(e){} }
async function speak(text, voice){
  try{
    const r = await fetch('/api/tts',{ method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({text,voice}) });
    if(!r.ok) return;
    const url = URL.createObjectURL(await r.blob());
    const p = getPlayer();
    await new Promise(resolve => {
      let done=false; const fin=()=>{ if(done)return; done=true; URL.revokeObjectURL(url); resolve(); };
      p.onended=fin; p.onerror=fin; p.src=url;
      const pr=p.play(); if(pr&&pr.catch)pr.catch(fin);
      setTimeout(fin, 20000);
    });
  }catch(e){ console.error('speak',e); }
}
let mediaRecorder, chunks=[], stream, recExt='webm';
async function ensureMic(){ if(!stream) stream = await navigator.mediaDevices.getUserMedia({audio:true}); return stream; }
function pickMime(){
  const cands=['audio/webm;codecs=opus','audio/webm','audio/mp4','audio/aac'];
  if(window.MediaRecorder && MediaRecorder.isTypeSupported){ for(const t of cands) if(MediaRecorder.isTypeSupported(t)) return t; }
  return '';
}
function startRec(){
  if(!window.MediaRecorder) throw new Error('Браузърът не поддържа запис на глас.');
  chunks=[]; const mime=pickMime();
  recExt = (mime.includes('mp4')||mime.includes('aac')) ? 'mp4' : 'webm';
  mediaRecorder = mime ? new MediaRecorder(stream,{mimeType:mime}) : new MediaRecorder(stream);
  mediaRecorder.ondataavailable = e => { if(e.data.size) chunks.push(e.data); };
  mediaRecorder.start();
}
function stopRec(){ return new Promise((res,rej)=>{ try{ mediaRecorder.onstop=()=>res(new Blob(chunks,{type:mediaRecorder.mimeType||'audio/webm'})); mediaRecorder.stop(); }catch(e){rej(e);} }); }
async function transcribe(blob, lang){
  const fd=new FormData(); fd.append('audio',blob,'answer.'+recExt); fd.append('lang',lang);
  const r=await fetch('/api/stt',{method:'POST',body:fd}); const j=await r.json();
  if(j.error) throw new Error(j.error); return (j.text||'').trim();
}
function saidRepeat(text){ return /не (те )?чух|не чувам|повтори|repeat|didn'?t hear|can'?t hear|again/i.test(text); }
function shuffle(a){ a=a.slice(); for(let i=a.length-1;i>0;i--){ const j=Math.random()*(i+1)|0; [a[i],a[j]]=[a[j],a[i]]; } return a; }

// ================= SCREEN 2: QUIZ =================
let currentFolder = null;
let quizWords = [];        // shortcut to currentFolder.words
let queue = [];
let wrongThisRound = [];
let round = 1;
let firstRoundErrors = 0;
let scored = false;
let current = null;

async function startExercise(id){
  const f = folders.find(x => x.id === id);
  if (!f) return;
  currentFolder = f; quizWords = f.words;
  unlockAudio();
  try { await ensureMic(); }
  catch(e){ alert('Нужен е достъп до микрофона. Разреши го и опитай пак.'); return; }
  showScreen('quizScreen');
  queue = shuffle(quizWords.map(w => w.english));
  wrongThisRound = []; round = 1; firstRoundErrors = 0; scored = false;
  $('nextBtn').classList.add('hidden');
  $('recBtn').classList.remove('hidden'); $('repeatBtn').classList.remove('hidden');
  await speak('Great! Let us begin.');
  nextWord();
}
function quitToHome(){ goHome(); }

async function nextWord(){
  $('quizFeedback').textContent = ''; $('heard').textContent = '';
  $('nextBtn').classList.add('hidden');
  $('recBtn').classList.remove('hidden'); $('repeatBtn').classList.remove('hidden');
  if (!queue.length) {
    if (round === 1) { firstRoundErrors = wrongThisRound.length; recordScore(); }
    if (wrongThisRound.length) {
      round++; queue = shuffle(wrongThisRound); wrongThisRound = [];
      $('bigword').textContent = '🔁';
      $('quizFeedback').innerHTML = '<span class="bad">Сега повтаряме думите с грешки</span>';
      $('quizStatus').textContent = '';
      await new Promise(r => setTimeout(r, 1500));
      $('quizFeedback').textContent = '';
    } else {
      return startTranslation();
    }
  }
  const en = queue[0];
  current = quizWords.find(w => w.english === en);
  $('progress').textContent = 'Остават ' + queue.length + ' думи' + (round > 1 ? ' · кръг ' + round : '');
  $('bigword').textContent = en;
  $('quizStatus').textContent = 'Слушай…';
  await speak(en, 'nova');
  $('quizStatus').textContent = 'Кажи значенията на български';
}

function recordScore(){
  if (scored) return; scored = true;
  const total = quizWords.length;
  const pct = total ? Math.round(firstRoundErrors / total * 100) : 0;
  currentFolder.lastScore = { errors: firstRoundErrors, total, pct, at: Date.now() };
  saveFolders();
}

$('repeatBtn').addEventListener('click', () => { if (current) speak(current.english, 'nova'); });
$('nextBtn').addEventListener('click', () => nextWord());

let recording = false;
$('recBtn').addEventListener('click', async () => {
  if (!current) return;
  try {
    if (!recording) {
      await ensureMic();
      startRec(); recording = true;
      $('mic').classList.add('rec');
      $('recBtn').textContent = '⏹ Спри и провери';
      $('quizStatus').textContent = 'Слушам те…';
    } else {
      recording = false;
      $('mic').classList.remove('rec');
      $('recBtn').textContent = '🎤 Кажи отговора';
      $('recBtn').disabled = true;
      $('quizStatus').innerHTML = '<div class="spinner"></div>';
      const said = await transcribe(await stopRec(), 'bg');
      $('recBtn').disabled = false;
      $('heard').textContent = said ? '„' + said + '“' : '';
      if (!said || saidRepeat(said)) {
        $('quizStatus').textContent = 'Повтарям думата…';
        await speak(current.english, 'nova');
        $('quizStatus').textContent = 'Кажи значенията на български';
        return;
      }
      await evaluateWord(said);
    }
  } catch (e) {
    console.error(e); recording = false;
    $('mic').classList.remove('rec');
    $('recBtn').textContent = '🎤 Кажи отговора'; $('recBtn').disabled = false;
    $('quizStatus').textContent = 'Грешка: ' + e.message;
  }
});

async function evaluateWord(said){
  $('quizStatus').textContent = 'Проверявам…';
  const r = await fetch('/api/check', { method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({ english: current.english, meanings: current.meanings, answer: said }) });
  const j = await r.json();
  if (j.status === 'correct') {
    $('quizFeedback').innerHTML = '<span class="ok">✅ ' + escapeHtml(j.feedback || 'Браво!') + '</span>';
    queue.shift();
    $('quizStatus').textContent = '';
    setTimeout(nextWord, 900);
  } else {
    // correction on screen only, advance with the Напред button
    let msg = '❌ Правилно: ' + current.meanings.join(', ');
    if (j.missed && j.missed.length) msg += ' · Пропусна: ' + j.missed.join(', ');
    if (j.wrong && j.wrong.length) msg += ' · Грешно: ' + j.wrong.join(', ');
    $('quizFeedback').innerHTML = '<span class="bad">' + escapeHtml(msg) + '</span>';
    if (!wrongThisRound.includes(current.english)) wrongThisRound.push(current.english);
    queue.shift();
    $('quizStatus').textContent = 'Прочети верния отговор, после натисни Напред.';
    $('recBtn').classList.add('hidden'); $('repeatBtn').classList.add('hidden');
    $('nextBtn').classList.remove('hidden');
  }
}

// ================= TRANSLATION =================
let sentences = [], sIndex = 0;
async function startTranslation(){
  showScreen('translateScreen');
  $('tStatus').innerHTML = '<div class="spinner"></div>Подготвям изречения…';
  await speak('Excellent! Now translate some sentences.');
  const r = await fetch('/api/sentences', { method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({ words: quizWords.map(w => w.english), count: 5 }) });
  const j = await r.json();
  sentences = j.sentences || []; sIndex = 0;
  if (!sentences.length) return finish();
  showSentence();
}
function showSentence(){
  $('tFeedback').textContent=''; $('tHeard').textContent='';
  const s = sentences[sIndex];
  $('tProgress').textContent = 'Изречение ' + (sIndex+1) + ' от ' + sentences.length;
  $('sentence').textContent = s.bg;
  $('tStatus').textContent = 'Преведи на английски и го кажи';
}
$('tRepeatBtn').addEventListener('click', () => { const s = sentences[sIndex]; if (s) $('sentence').textContent = s.bg; });

let tRecording = false;
$('tRecBtn').addEventListener('click', async () => {
 try {
  if (!tRecording) {
    await ensureMic();
    startRec(); tRecording = true;
    $('tMic').classList.add('rec'); $('tRecBtn').textContent = '⏹ Спри и провери';
    $('tStatus').textContent = 'Слушам те…';
  } else {
    tRecording = false; $('tMic').classList.remove('rec');
    $('tRecBtn').textContent = '🎤 Кажи превода'; $('tRecBtn').disabled = true;
    $('tStatus').innerHTML = '<div class="spinner"></div>';
    const said = await transcribe(await stopRec(), 'en');
    $('tRecBtn').disabled = false;
    $('tHeard').textContent = said ? '„' + said + '“' : '';
    if (!said || saidRepeat(said)) { $('tStatus').textContent = 'Кажи превода на английски'; return; }
    const s = sentences[sIndex];
    const r = await fetch('/api/check-translation', { method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ bg: s.bg, answer: said }) });
    const j = await r.json();
    if (j.status === 'correct') {
      $('tFeedback').innerHTML = '<span class="ok">✅ ' + escapeHtml(j.feedback||'Браво!') + '</span>';
      sIndex++;
      if (sIndex >= sentences.length) return finish();
      setTimeout(showSentence, 900);
    } else {
      const corr = j.correctTranslation ? ' Правилно: „' + j.correctTranslation + '“.' : '';
      $('tFeedback').innerHTML = '<span class="bad">❌ ' + escapeHtml((j.feedback||'') + corr) + '</span>';
      $('tStatus').textContent = 'Опитай пак или продължи';
    }
  }
 } catch (e) {
   console.error(e); tRecording = false; $('tMic').classList.remove('rec');
   $('tRecBtn').textContent = '🎤 Кажи превода'; $('tRecBtn').disabled = false;
   $('tStatus').textContent = 'Грешка: ' + e.message;
 }
});

function finish(){
  const s = currentFolder && currentFolder.lastScore;
  $('doneScore').textContent = s ? ('Грешки при първия опит: ' + s.errors + ' от ' + s.total + ' (' + s.pct + '%)') : '';
  showScreen('doneScreen');
  speak('Congratulations! You finished. Great work!');
}

loadFolders();
renderFolders();
showScreen('foldersScreen');
